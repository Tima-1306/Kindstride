yaml

name: Save GitHub Traffic Data Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Record Traffic
        uses: sangonzal/github-repository-traffic-action@v2
        env:
          API_TOKEN_GITHUB: ${{ secrets.TRAFFIC_TOKEN }} 
        with:
          branch: traffic 
